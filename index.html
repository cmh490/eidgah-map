    media=`<a href="${link}" target="_blank" rel="noopener"><img src="${p.photo}" alt="${(p.en||'').replace(/"/g,'')} today" loading="lazy" onerror="this.parentNode.parentNode.querySelector('.gfallback')?.removeAttribute('style');this.parentNode.style.display='none';"/></a>`;
  } else { media=''; }
  // map fallback (free, keyless) shown when there is no photo (or photo fails)
  const mapsrc=`https://maps.google.com/maps?q=${p.ll[0]},${p.ll[1]}&z=18&output=embed`;
  const fallback=`<iframe class="gfallback" ${p.photo?'style="display:none"':''} loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="${mapsrc}"></iframe>`;
  return `<div class="gprev"><div class="tag"><span class="d"></span>Still standing today</div>${media}${fallback}<div class="lnks"><a href="${link}" target="_blank" rel="noopener">View on Google Maps &#8599;</a></div></div>`;
}
function showDetail(p){legend.style.display='none';const color=TYPE_COLORS[p.ty]||TYPE_COLORS.residence;
  let chips=`<span class="chip ty" style="background:${color}">${TYPE_LABELS[p.ty]||p.ty}</span>`;if(p.fam)chips+=`<span class="chip">${p.fam} family</span>`;
  detail.innerHTML=`<div class="dh"><div><div class="en">${p.en||'&mdash;'}</div>${p.fa?`<div class="fa">${p.fa}</div>`:''}</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px"><button class="close">&times;</button><span class="pid">No. ${p.id}</span></div></div><div class="db"><div class="meta">${chips}</div>${p.nt?`<div class="nt">${p.nt}</div>`:''}${p.live?gmPreview(p):''}</div>`;
  detail.style.display='block';detail.querySelector('.close').onclick=()=>detail.style.display='none';
  const l=layers[p.id];if(l){map.fitBounds(l.getBounds().pad(2),{animate:true,maxZoom:19});highlight(p);}}
const search=document.getElementById('search'),results=document.getElementById('results'),clearbtn=document.getElementById('clearbtn');
function norm(s){return (s||'').toLowerCase().replace(/[^a-z0-9\u0600-\u06ff ]/g,'').trim();}
function doSearch(q){const nq=norm(q);if(!nq){results.style.display='none';clearbtn.style.display='none';return;}clearbtn.style.display='block';
  const hits=PARCELS.filter(p=>norm(p.en).includes(nq)||norm(p.fa).includes(nq)||norm(p.fam).includes(nq)||p.id===nq);
  hits.sort((a,b)=>(a.fam||'zz').localeCompare(b.fam||'zz'));
  let html=hits.length?((hits.length>1?`<div class="hdr">${hits.length} homes</div>`:'')+hits.slice(0,80).map(p=>`<div class="r" data-id="${p.id}"><span class="nm">${p.en}</span><span style="display:flex;gap:8px;align-items:baseline">${p.fam?`<span class="fam">${p.fam}</span>`:''}<span class="pid">${p.id}</span></span></div>`).join('')):'<div class="empty">No homes found by that name.</div>';
  results.innerHTML=html;
  results.querySelectorAll('.r[data-id]').forEach(el=>el.onclick=()=>{const p=PARCELS.find(x=>x.id===el.dataset.id);results.style.display='none';search.value=p.en;showDetail(p);});
  results.style.display='block';}
search.addEventListener('input',e=>doSearch(e.target.value));clearbtn.onclick=()=>{search.value='';doSearch('');search.focus();};
const legend=document.getElementById('legend');
(function(){const order=['residence','synagogue','school','bath','cemetery','business','storage'],counts={};
  PARCELS.forEach(p=>counts[p.ty]=(counts[p.ty]||0)+1);
  legend.innerHTML=`<h3>What the colors mean</h3>`+order.filter(t=>counts[t]).map(t=>`<div class="legrow"><span class="dot" style="background:${TYPE_COLORS[t]}"></span>${TYPE_LABELS[t]} <span style="color:#9a8a70;font-size:11.5px">&middot; ${counts[t]}</span></div>`).join('')+`<div class="note">Every lot of the vanished quarter, hand-traced from the community map in <em>Two Centuries of Resistance: The History of Mashadi Jews</em> and fitted to modern Mashhad by surviving landmarks and streets. The original was drawn by hand; placement is careful but approximate.</div>`;})();
document.getElementById('legendbtn').onclick=()=>{detail.style.display='none';legend.style.display=legend.style.display==='block'?'none':'block';};
let meMarker=null,meCircle=null;const toast=document.getElementById('toast');
function showToast(m,ms){toast.innerHTML=m;toast.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(()=>toast.style.display='none',ms||3000);}
document.getElementById('locbtn').onclick=()=>{if(!navigator.geolocation){showToast('Location is not available on this device.');return;}showToast('Finding your location&hellip;',8000);
  navigator.geolocation.getCurrentPosition(pos=>{const {latitude:lat,longitude:lng,accuracy:acc}=pos.coords,here=[lat,lng];
    if(meMarker)map.removeLayer(meMarker);if(meCircle)map.removeLayer(meCircle);
    meMarker=L.circleMarker(here,{radius:8,color:'#fff',weight:3,fillColor:'#c0392b',fillOpacity:1}).addTo(map);
    meCircle=L.circle(here,{radius:acc,color:'#c0392b',weight:1,fillColor:'#c0392b',fillOpacity:0.1}).addTo(map);
    const d=Math.round(L.latLng(36.282,59.616).distanceTo(L.latLng(lat,lng)));map.setView(here,18,{animate:true});
    showToast(d>1500?`You are about ${(d/1000).toFixed(1)} km from the old quarter.`:`You are here \u2014 standing on the ground of the old quarter.`,5000);
  },()=>showToast('Could not get your location.',4000),{enableHighAccuracy:true,timeout:8000,maximumAge:0});};
const BaseToggle=L.Control.extend({options:{position:'bottomright'},onAdd:function(){const b=L.DomUtil.create('button','tbtn');b.style.margin='0 0 6px 0';b.innerHTML='&#x1f30d;';b.title='Map / Satellite';L.DomEvent.on(b,'click',e=>{L.DomEvent.stop(e);if(map.hasLayer(sat)){map.removeLayer(sat);osm.addTo(map);}else{map.removeLayer(osm);sat.addTo(map);}});return b;}});
map.addControl(new BaseToggle());
map.on('click',()=>results.style.display='none');
try{map.fitBounds(grid.getBounds().pad(0.12));}catch(e){}
setTimeout(()=>showToast('Every home of old Jewish Eidgah, fitted by hand onto modern Mashhad. Search a family, or tap any lot.',6500),700);
}
</script></body></html>
